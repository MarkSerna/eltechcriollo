name: techcriollo

services:
  # --- Backend Service (FastAPI + Playwright) ---
  techcriollo-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techcriollo-api
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://techcriollo:password@localhost:5432/techcriollo}
      - OLLAMA_URL=${OLLAMA_URL:-host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:31b-cloud}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - RENDER=${RENDER:-false}
      - SECRET_KEY=${SECRET_KEY:-changeme-production-secret-key}
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/reports:/app/reports
      - ./backend/static:/app/static
    ports:
      - "8001:8000"
    restart: unless-stopped
    networks:
      - techcriollo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- Frontend Service (React + Nginx) ---
  techcriollo-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techcriollo-web
    environment:
      - API_BASE_URL=${API_BASE_URL:-http://techcriollo-api:8000}
    ports:
      - "8088:80"
    depends_on:
      - techcriollo-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - techcriollo-network

networks:
  techcriollo-network:
    driver: bridge
