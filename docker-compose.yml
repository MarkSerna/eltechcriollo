name: techcriollo

services:
  # --- Backend Service (FastAPI + Playwright) ---
  techcriollo-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: techcriollo-api
    env_file:
      - ./backend/.env
    volumes:
      # Persistencia de datos críticos
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/reports:/app/reports
      - ./backend/static:/app/static
    # Exponemos el puerto 8001 en el host para evitar conflictos (mapeado al 8000 interno)
    ports:
      - "8001:8000"
    restart: unless-stopped

  # --- Frontend Service (React + Nginx) ---
  techcriollo-web:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techcriollo-web
    ports:
      # Mantenemos el puerto 8088 que el usuario ya conoce para acceder vía navegador
      - "8088:80"
    depends_on:
      - techcriollo-api
    restart: unless-stopped
