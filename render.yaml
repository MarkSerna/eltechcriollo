services:
  # --- API Backend (FastAPI + Playwright) ---
  - type: web
    name: techcriollo-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "8000"
      - key: RENDER
        value: "true"
      - key: AI_PROVIDER
        value: gemini
      - key: OLLAMA_URL
        value: host.docker.internal:11434
      - key: CORS_ORIGINS
        value: "https://techcriollo-web.onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true

  # --- Web Frontend (React + Nginx) ---
  - type: web
    name: techcriollo-web
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    plan: free