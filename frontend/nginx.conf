server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API - usar variable BACKEND_URL
    location /api/ {
        # Por defecto en producción de Render usa onrender.com
        set $backend "techcriollo-api.onrender.com";
        set $backend_port 443;
        set $scheme "https";

        # Override con variable de entorno si existe
        set $full_backend "${BACKEND_URL}";

        # Si hay un URL definida, usarla
        proxy_pass https://$backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_connect_timeout 30s;
    }

    location /static/ {
        set $backend "techcriollo-api.onrender.com";
        proxy_pass https://$backend/static/;
        proxy_set_header Host $backend;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}