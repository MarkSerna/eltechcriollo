server {
    listen 80;
    server_name localhost;

    # Aplicación React (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Redirección de API al contenedor del backend (Servicio Privado)
    location /api/ {
        proxy_pass http://techcriollo-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Endpoints de Autenticación (Proxy)
    location /login {
        proxy_pass http://techcriollo-api:8000/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /logout {
        proxy_pass http://techcriollo-api:8000/logout;
        proxy_set_header Host $host;
    }

    # Archivos estáticos servidos por FastAPI (si se requieren)
    location /static/ {
        proxy_pass http://techcriollo-api:8000/static/;
        proxy_set_header Host $host;
    }

    # Configuración de Errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
