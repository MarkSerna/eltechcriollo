name: techcriollo
services:
  bot_scrapper:
    build: .
    container_name: techcriollo-app
    env_file:
      - .env
    volumes:
      # Mapeo completo para desarrollo (hot-reload habilitado en main.py)
      - .:/app
      # Mapeo explícito de carpetas persistentes
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    ports:
      - "8088:8000"
    restart: unless-stopped
