server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API - Proxy directo a la URL pública del backend en Render
    location /api/ {
        proxy_pass https://techcriollo-api.onrender.com/api/;
        proxy_http_version 1.1;
        proxy_set_header Host techcriollo-api.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Static files
    location /static/ {
        proxy_pass https://techcriollo-api.onrender.com/static/;
        proxy_set_header Host techcriollo-api.onrender.com;
    }

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}